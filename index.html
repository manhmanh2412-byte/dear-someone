
  <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda Story - Magic Letter</title>
    <style>
        :root {
            --text-color: #333;
            --bg-overlay: rgba(255, 255, 255, 0.6); 
            --font-main: 'Georgia', serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .full-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('panda.jpg');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        .main-container {
            text-align: center;
            background: var(--bg-overlay);
            padding: 30px 50px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            max-width: 85%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            /* Nhích khung lên cao để thấy mặt gấu trúc */
            margin-bottom: 220px; 
            transition: all 0.5s ease;
            position: relative;
        }

        .content-area {
            min-height: 80px;
            display: flex; align-items: center; justify-content: center;
        }

        .question, .response {
            font-size: 1.6rem;
            color: var(--text-color);
            font-weight: bold;
            margin: 0;
        }

        .response { display: none; }

        .btn-group {
            display: flex; justify-content: space-around;
            margin-top: 30px; min-height: 50px;
            gap: 60px; /* Khoảng cách rộng rãi giữa 2 nút */
        }

        .btn {
            padding: 10px 35px; border-radius: 25px;
            border: 1px solid #333; background: white;
            cursor: pointer; font-family: inherit; transition: 0.3s;
        }

        .btn-yes:hover { background: #333; color: white; }

        #btn-no { position: relative; transition: all 0.2s ease; z-index: 100; }

        /* --- CSS LÁ THƯ --- */
        .envelope-wrapper {
            display: none;
            cursor: pointer;
            margin-top: 30px;
            perspective: 1000px;
            animation: fadeInUp 1s forwards;
        }

        .envelope {
            width: 150px; height: 100px;
            background: #f3d5b5;
            position: relative; margin: 0 auto;
            border-bottom-left-radius: 5px; border-bottom-right-radius: 5px;
        }

        .envelope::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 0; height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-top: 60px solid #d4a373;
            z-index: 3; transition: transform 0.5s;
            transform-origin: top;
        }

        .letter {
            position: absolute; bottom: 5px; left: 10px;
            width: 130px; height: 70px;
            background: white; z-index: 2;
            transition: all 0.5s;
            padding: 15px; box-sizing: border-box;
            font-size: 0.7rem; overflow: hidden;
            text-align: left; border: 1px solid #eee;
        }

        .envelope.open::before { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .letter {
            transform: translateY(-90px);
            height: 180px; width: 230px; left: -40px;
            font-size: 0.95rem; z-index: 2;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="full-bg"></div>

    <div class="main-container" id="ui-box">
        <div class="content-area">
            <div class="question" id="text-q">Xin chào, bạn có thích gấu trúc hong?</div>
            <div class="response" id="text-r">Tui cũng thích tụi ló.</div>
        </div>

        <div class="btn-group" id="btn-area">
            <button class="btn btn-yes" onclick="handleYes()">Có có</button>
            <button class="btn" id="btn-no" onmouseover="runAway()">Không thích</button>
        </div>

        <div class="envelope-wrapper" id="letter-box" onclick="openLetter()">
            <div class="envelope" id="env">
                <div class="letter">
                    <b>Gửi b...</b><br><br>
                    Thật ra tui làm cái web này chỉ để hỏi b câu đó thui á. <br><br>
                    Hy vọng b sẽ thấy vui khi mở lá thư này nha! ✨
                </div>
            </div>
            <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">(Bấm để mở thư nhé)</p>
        </div>
    </div>

    <script>
        function handleYes() {
            document.getElementById('text-q').style.display = 'none';
            document.getElementById('btn-area').style.display = 'none';
            document.getElementById('text-r').style.display = 'block';
            document.getElementById('letter-box').style.display = 'block';
            
            // Nhích nhẹ khung xuống một xíu cho cân đối khi có thư hiện ra
            document.getElementById('ui-box').style.marginBottom = "120px";
        }

        function openLetter() {
            document.getElementById('env').classList.toggle('open');
        }

        function runAway() {
            const btnNo = document.getElementById('btn-no');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 100);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 100);
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>
</body>
</html>
