<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Someone - Panda Story</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-main: #222222;
            --text-sub: #777777;
            --font-main: 'Georgia', serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            position: relative;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
        }

        .image-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* Chữ đè lên giữa bức ảnh */
        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333; /* Bạn có thể đổi sang trắng #fff nếu ảnh gấu trúc tối màu */
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            pointer-events: none; /* Để không cản trở việc click vào container nếu cần */
        }

        .content-box {
            position: relative;
            height: 60px;
            margin-top: 25px;
        }

        .message {
            position: absolute;
            width: 100%;
            left: 0; top: 0;
            font-size: 1.2rem;
            opacity: 0;
            transition: all 0.8s ease;
        }

        .fade-in-view {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* Group nút bấm */
        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 50px;
        }

        .btn {
            background: white;
            border: 1px solid #ddd;
            padding: 10px 25px;
            cursor: pointer;
            font-family: inherit;
            border-radius: 20px;
            transition: 0.3s;
        }

        .btn-yes:hover {
            border-color: #333;
            background-color: #f9f9f9;
        }

        /* Nút Không thích chạy trốn */
        #btn-no {
            position: absolute;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-wrapper">
            <img src="panda.jpg" alt="Panda">
            <div class="overlay-text" id="main-question">
                Hellu, b có thích gấu trúc hong?
            </div>
        </div>

        <div class="content-box">
            <div class="message" id="response-msg">
                Tui cũng thích tụi ló, heh
            </div>
        </div>

        <div class="btn-group" id="actions">
            <button class="btn btn-yes" onclick="sayYes()">Có có</button>
            <button class="btn" id="btn-no" onmouseover="moveButton()">Không thích</button>
        </div>
    </div>

    <script>
        function sayYes() {
            // Hiện dòng chữ phản hồi
            document.getElementById('response-msg').classList.add('fade-in-view');
            
            // Ẩn câu hỏi cũ và nút bấm
            document.getElementById('main-question').style.opacity = '0';
            document.getElementById('actions').style.display = 'none';
        }

        function moveButton() {
            const btnNo = document.getElementById('btn-no');
            
            // Tính toán vị trí ngẫu nhiên trong phạm vi màn hình
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 50);
            
            // Đưa nút ra khỏi container để bay tự do trên màn hình
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }
    </script>

</body>
</html>
