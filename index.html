<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Someone - Panda Story</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-main: #222222;
            --text-sub: #777777;
            --font-main: 'Georgia', serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .image-container img {
            max-width: 90%;
            height: auto;
            border-radius: 4px;
        }

        .content-box {
            position: relative;
            height: 80px;
            margin-top: 25px;
        }

        .message {
            position: absolute;
            width: 100%;
            left: 0; top: 0;
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0;
            transition: all 1.2s ease;
        }

        /* Dòng chữ đầu tiên hiển thị sẵn */
        #msg-1 { 
            opacity: 1; 
            transform: translateY(0); 
        }

        /* Hiệu ứng trôi lên và mờ dần cho dòng cũ */
        .slide-up-out {
            opacity: 0 !important;
            transform: translateY(-30px) !important;
        }

        /* Hiệu ứng hiện hình cho dòng mới */
        .fade-in-view {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .btn-next {
            margin-top: 30px;
            background: none;
            border: 1px solid #ddd;
            padding: 10px 25px;
            cursor: pointer;
            font-family: inherit;
            color: var(--text-sub);
            letter-spacing: 1px;
            transition: 0.3s;
            border-radius: 20px;
        }

        .btn-next:hover {
            border-color: #333;
            color: #333;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-container">
            <img src="panda.jpg" alt="Panda Image">
        </div>

        <div class="content-box">
            <div class="message" id="msg-1">Hellu, b có thích gấu trúc hong?</div>
            <div class="message" id="msg-2" style="transform: translateY(20px);">
                Tui thì thích lắm á.<br>
                <span style="color: var(--text-sub); font-size: 0.95rem;">Vì chúng trông có vẻ... bình yên.</span>
            </div>
        </div>

        <button class="btn-next" id="trigger-btn" onclick="handleTransition()">Tiếp tục</button>
    </div>

    <script>
        function handleTransition() {
            const firstMsg = document.getElementById('msg-1');
            const secondMsg = document.getElementById('msg-2');
            const button = document.getElementById('trigger-btn');

            // 1. Cho dòng 1 lướt lên và mờ đi
            firstMsg.classList.add('slide-up-out');

            // 2. Sau 0.6s cho dòng 2 hiện lên
            setTimeout(() => {
                secondMsg.classList.add('fade-in-view');
            }, 600);

            // 3. Làm mờ nút bấm sau khi nhấn
            button.style.opacity = '0';
            setTimeout(() => {
                button.remove();
            }, 1000);
        }
    </script>

</body>
</html>
